services:
  postgres:
    image: postgres:16-alpine
    container_name: owl-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: owl
      POSTGRES_USER: owl
      POSTGRES_PASSWORD: owl_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U owl -d owl"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - owl_postgres:/var/lib/postgresql/data

  owl:
    image: czyt/owl:latest
    container_name: owl
    restart: unless-stopped
    pull_policy: always
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      OWL_PORT: ${OWL_PORT:-8080}
      OWL_JWT_SECRET: ${OWL_JWT_SECRET:-change-me-in-production}
      OWL_BOOTSTRAP_ADMIN: ${OWL_BOOTSTRAP_ADMIN:-true}
      OWL_ADMIN_USERNAME: ${OWL_ADMIN_USERNAME:-admin}
      OWL_ADMIN_PASSWORD: ${OWL_ADMIN_PASSWORD:-admin123456}
      OWL_DATA_DIR: /app/data
      OWL_UPLOADS_DIR: /app/data/uploads
      OWL_LIBRARY_DIR: ${OWL_LIBRARY_DIR:-/app/data/uploads}
      OWL_DB_PATH: /app/data/data.db
      OWL_DB_TYPE: postgres
      OWL_DB_DSN: ${OWL_DB_DSN:-postgres://owl:owl_password@postgres:5432/owl?sslmode=disable}
      OWL_FRONTEND_ORIGIN: '*'
      OWL_REDIS_ADDR: ''
      OWL_REDIS_PASSWORD: ''
      OWL_REDIS_DB: 0
      OWL_REDIS_KEY_PREFIX: ${OWL_REDIS_KEY_PREFIX:-owl:mdx:index}
      OWL_REDIS_PREFIX_MAX_LEN: ${OWL_REDIS_PREFIX_MAX_LEN:-8}
      OWL_REDIS_SEARCH_ENABLED: 'false'
      OWL_REDIS_SEARCH_KEY_PREFIX: ${OWL_REDIS_SEARCH_KEY_PREFIX:-owl:mdx:search}
    ports:
      - '${OWL_PORT:-8080}:8080'
    volumes:
      - owl_data:/app/data

volumes:
  owl_data:
  owl_postgres:
