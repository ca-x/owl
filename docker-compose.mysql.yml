services:
  mysql:
    image: mysql:8.4
    container_name: owl-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: owl
      MYSQL_USER: owl
      MYSQL_PASSWORD: owl_password
      MYSQL_ROOT_PASSWORD: owl_root_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uowl", "-powl_password"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - owl_mysql:/var/lib/mysql

  owl:
    image: czyt/owl:latest
    container_name: owl
    restart: unless-stopped
    pull_policy: always
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      OWL_PORT: ${OWL_PORT:-8080}
      OWL_JWT_SECRET: ${OWL_JWT_SECRET:-change-me-in-production}
      OWL_BOOTSTRAP_ADMIN: ${OWL_BOOTSTRAP_ADMIN:-true}
      OWL_ADMIN_USERNAME: ${OWL_ADMIN_USERNAME:-admin}
      OWL_ADMIN_PASSWORD: ${OWL_ADMIN_PASSWORD:-admin123456}
      OWL_DATA_DIR: /app/data
      OWL_UPLOADS_DIR: /app/data/uploads
      OWL_LIBRARY_DIR: ${OWL_LIBRARY_DIR:-/app/data/uploads}
      OWL_DB_PATH: /app/data/data.db
      OWL_DB_TYPE: mysql
      OWL_DB_DSN: ${OWL_DB_DSN:-owl:owl_password@tcp(mysql:3306)/owl?parseTime=true&charset=utf8mb4&loc=Local}
      OWL_FRONTEND_ORIGIN: '*'
      OWL_REDIS_ADDR: ''
      OWL_REDIS_PASSWORD: ''
      OWL_REDIS_DB: 0
      OWL_REDIS_KEY_PREFIX: ${OWL_REDIS_KEY_PREFIX:-owl:mdx:index}
      OWL_REDIS_PREFIX_MAX_LEN: ${OWL_REDIS_PREFIX_MAX_LEN:-8}
      OWL_REDIS_SEARCH_ENABLED: 'false'
      OWL_REDIS_SEARCH_KEY_PREFIX: ${OWL_REDIS_SEARCH_KEY_PREFIX:-owl:mdx:search}
    ports:
      - '${OWL_PORT:-8080}:8080'
    volumes:
      - owl_data:/app/data

volumes:
  owl_data:
  owl_mysql:
